<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f2866e"/>
      <stop offset="100%" style="stop-color:#d46a52"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#ffe8e2"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect x="32" y="32" width="448" height="448" rx="112" ry="112" fill="url(#bg)"/>
  
  <!-- Stylized "Z" character with question-mark abstraction -->
  <!-- Top bar -->
  <rect x="136" y="152" width="200" height="32" rx="16" fill="url(#accent)" opacity="0.95"/>
  <!-- Diagonal -->
  <rect x="176" y="184" width="200" height="32" rx="16" fill="url(#accent)" opacity="0.85" transform="rotate(-30, 276, 200)"/>
  <!-- Bottom bar -->
  <rect x="136" y="296" width="200" height="32" rx="16" fill="url(#accent)" opacity="0.95"/>
  <!-- Dot/accent at end of bottom bar -->
  <circle cx="304" cy="288" r="28" fill="url(#accent)" opacity="0.75"/>
</svg>
